<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 210" role="img" aria-label="Zoltar — Guía Espiritual y Sanación">
  <defs>
    <filter id="orbGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="haloGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Orb gradient: cerulean center → amethyst edge -->
    <radialGradient id="orbGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#d4eeff"/>
      <stop offset="30%"  stop-color="#7eb8e8"/>
      <stop offset="60%"  stop-color="#4a7ab5"/>
      <stop offset="85%"  stop-color="#7c6fa0"/>
      <stop offset="100%" stop-color="#3d2d6e"/>
    </radialGradient>
    <radialGradient id="orbShimmer" cx="32%" cy="28%" r="42%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloRing" cx="50%" cy="50%" r="50%">
      <stop offset="72%"  stop-color="transparent"/>
      <stop offset="85%"  stop-color="#b8860b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Letter fill gradient -->
    <linearGradient id="letterFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4a3a6e"/>
      <stop offset="50%"  stop-color="#2d2540"/>
      <stop offset="100%" stop-color="#1a1530"/>
    </linearGradient>
    <!-- Letter edge shimmer -->
    <linearGradient id="letterEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9b8abf" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#7c6fa0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a90c4" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Wing gradient -->
    <linearGradient id="wingFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c6fa0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4a90c4" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <!-- Ambient halo behind orb -->
  <circle cx="250" cy="96" r="68" fill="url(#haloRing)" filter="url(#haloGlow)"/>
  <circle cx="250" cy="96" r="62" fill="none" stroke="#b8860b" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- ── LEFT WING ── -->
  <g opacity="0.8" filter="url(#softGlow)">
    <path d="M158 84 C132 62,100 68, 82 80 C100 74,124 78,148 94 Z" fill="url(#wingFill)"/>
    <path d="M156 92 C128 78, 98 86, 80 102 C100 92,126 90,150 102 Z" fill="url(#wingFill)" opacity="0.75"/>
    <path d="M158 100 C132 94,102 106, 86 122 C104 110,128 108,152 116 Z" fill="url(#wingFill)" opacity="0.55"/>
    <!-- Eye detail -->
    <ellipse cx="84" cy="82" rx="6" ry="4" fill="#4a90c4" opacity="0.55"/>
    <ellipse cx="84" cy="82" rx="3" ry="2.2" fill="#2d2540" opacity="0.75"/>
    <circle cx="83" cy="81" r="1" fill="white" opacity="0.9"/>
    <!-- Feather veins -->
    <line x1="148" y1="94" x2="106" y2="74" stroke="#7c6fa0" stroke-width="0.7" stroke-opacity="0.45"/>
    <line x1="150" y1="102" x2="106" y2="90" stroke="#7c6fa0" stroke-width="0.6" stroke-opacity="0.35"/>
    <line x1="152" y1="116" x2="108" y2="108" stroke="#7c6fa0" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- ── RIGHT WING ── -->
  <g opacity="0.8" filter="url(#softGlow)">
    <path d="M342 84 C368 62,400 68, 418 80 C400 74,376 78,352 94 Z" fill="url(#wingFill)"/>
    <path d="M344 92 C372 78, 402 86, 420 102 C400 92,374 90,350 102 Z" fill="url(#wingFill)" opacity="0.75"/>
    <path d="M342 100 C368 94,398 106, 414 122 C396 110,372 108,348 116 Z" fill="url(#wingFill)" opacity="0.55"/>
    <ellipse cx="416" cy="82" rx="6" ry="4" fill="#4a90c4" opacity="0.55"/>
    <ellipse cx="416" cy="82" rx="3" ry="2.2" fill="#2d2540" opacity="0.75"/>
    <circle cx="415" cy="81" r="1" fill="white" opacity="0.9"/>
    <line x1="352" y1="94" x2="394" y2="74" stroke="#7c6fa0" stroke-width="0.7" stroke-opacity="0.45"/>
    <line x1="350" y1="102" x2="394" y2="90" stroke="#7c6fa0" stroke-width="0.6" stroke-opacity="0.35"/>
    <line x1="348" y1="116" x2="392" y2="108" stroke="#7c6fa0" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- ── CRYSTAL ORB ── -->
  <g filter="url(#orbGlow)">
    <circle cx="250" cy="96" r="50" fill="#2d2540" opacity="0.1"/>
    <circle cx="250" cy="96" r="47" fill="url(#orbGrad)"/>
    <!-- Inner swirl -->
    <g opacity="0.5">
      <path d="M250 56 C272 66,280 88,268 108 C256 128,228 130,214 112 C200 94,210 68,232 62 C242 59,256 62,264 74"
            fill="none" stroke="#b8d8f0" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M250 66 C268 74,276 94,264 110 C252 125,232 124,220 110"
            fill="none" stroke="#d0eaff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      <!-- Mandala center -->
      <circle cx="250" cy="96" r="9"  fill="none" stroke="#c8e8ff" stroke-width="0.9" opacity="0.8"/>
      <circle cx="250" cy="96" r="4.5" fill="#aad8f0" opacity="0.65"/>
      <line x1="250" y1="87"  x2="250" y2="105" stroke="#c8e8ff" stroke-width="0.8" opacity="0.6"/>
      <line x1="241" y1="96"  x2="259" y2="96"  stroke="#c8e8ff" stroke-width="0.8" opacity="0.6"/>
      <line x1="243.6" y1="89.6" x2="256.4" y2="102.4" stroke="#c8e8ff" stroke-width="0.65" opacity="0.5"/>
      <line x1="256.4" y1="89.6" x2="243.6" y2="102.4" stroke="#c8e8ff" stroke-width="0.65" opacity="0.5"/>
    </g>
    <!-- Specular highlight -->
    <ellipse cx="238" cy="80" rx="15" ry="11" fill="url(#orbShimmer)"/>
    <!-- Rim -->
    <circle cx="250" cy="96" r="47" fill="none" stroke="#9bbbd8" stroke-width="1.3" stroke-opacity="0.45"/>
  </g>

  <!-- ── ZOLTAR LETTERING ──
       Strategy: use a single centered text, then mask the O area with the orb.
       Font-size 58, letter-spacing 6, text-anchor middle.
       "ZOLTAR" centered at x=250 → spans full width safely. -->

  <!-- Shadow pass for depth -->
  <text x="251" y="120"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="900" letter-spacing="5"
    fill="#1a1530" opacity="0.18"
    text-anchor="middle">ZOLTAR</text>

  <!-- Main letters -->
  <text x="250" y="118"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="900" letter-spacing="5"
    fill="url(#letterFill)"
    text-anchor="middle"
    filter="url(#softGlow)">ZOLTAR</text>

  <!-- Shimmer stroke overlay -->
  <text x="250" y="118"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="900" letter-spacing="5"
    fill="none" stroke="url(#letterEdge)" stroke-width="0.9" opacity="0.55"
    text-anchor="middle">ZOLTAR</text>

  <!-- ── MYSTICAL RUNE ACCENTS ── -->
  <g font-family="Georgia, serif" font-size="11" fill="#7c6fa0" opacity="0.4" text-anchor="middle">
    <text x="250" y="48"  transform="rotate(-5,250,48)">ᚢ</text>
    <text x="196" y="58"  transform="rotate(-20,196,58)">ᚱ</text>
    <text x="304" y="58"  transform="rotate(20,304,58)">ᚾ</text>
    <text x="186" y="96">ᛗ</text>
    <text x="314" y="96">ᛚ</text>
    <text x="250" y="148" transform="rotate(3,250,148)">ᛟ</text>
  </g>

  <!-- ── DIVIDER + SUBTITLE ── -->
  <line x1="68"  y1="148" x2="172" y2="148" stroke="#b8860b" stroke-width="0.9" stroke-opacity="0.45"/>
  <circle cx="172" cy="148" r="1.6" fill="#b8860b" opacity="0.55"/>
  <line x1="432" y1="148" x2="328" y2="148" stroke="#b8860b" stroke-width="0.9" stroke-opacity="0.45"/>
  <circle cx="328" cy="148" r="1.6" fill="#b8860b" opacity="0.55"/>
  <polygon points="250,142 255,148 250,154 245,148" fill="#b8860b" opacity="0.5"/>

  <text x="250" y="173"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13" font-weight="400" letter-spacing="3.5"
    fill="#b8860b" text-anchor="middle" opacity="0.88">GUÍA ESPIRITUAL Y SANACIÓN</text>

  <!-- Sparkle dots -->
  <g fill="#b8860b" opacity="0.45">
    <circle cx="108" cy="132" r="1.2"/>
    <circle cx="118" cy="138" r="0.8"/>
    <circle cx="100" cy="142" r="0.7"/>
    <circle cx="392" cy="132" r="1.2"/>
    <circle cx="382" cy="138" r="0.8"/>
    <circle cx="400" cy="142" r="0.7"/>
    <circle cx="172" cy="52"  r="0.9"/>
    <circle cx="328" cy="52"  r="0.9"/>
  </g>
</svg>
